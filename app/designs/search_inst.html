<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Heritage Hearth - 添加账户</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#6f7975",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#2f312f",
                        "on-background": "#1a1c1a",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#84d6be",
                        "primary-container": "#2a806c",

                        "on-secondary-fixed": "#410007",
                        "surface-container-high": "#e9e8e5",
                        "surface-bright": "#faf9f6",
                        "primary-fixed": "#a0f2da",
                        "on-tertiary-fixed": "#271900",
                        "on-tertiary-fixed-variant": "#5b4313",
                        "secondary": "#b7102a",
                        "on-surface": "#1a1c1a",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#e6c185",
                        "on-secondary-container": "#fffbff",
                        "surface-container": "#efeeeb",
                        "on-error-container": "#93000a",
                        "primary": "#006754",
                        "secondary-fixed-dim": "#ffb3b1",
                        "on-tertiary-container": "#fff8f2",
                        "tertiary": "#705624",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#002019",
                        "surface-container-low": "#f4f3f1",

                        "tertiary-container": "#8b6e3a",
                        "surface": "#faf9f6",
                        "on-surface-variant": "#3f4945",
                        "on-secondary-fixed-variant": "#92001c",
                        "on-primary-fixed-variant": "#005142",
                        "background": "#faf9f6",
                        "surface-variant": "#e3e2e0",
                        "outline-variant": "#bec9c4",
                        "surface-container-highest": "#e3e2e0",
                        "secondary-fixed": "#ffdad8",
                        "inverse-primary": "#84d6be",
                        "on-primary-container": "#e7fff5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.75rem",
                        "lg": "1.5rem",
                        "xl": "1.5rem",
                        "xxl": "2rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Jetbrains Mono"]
                    }
                }
            }
        }

<style>
        body {
            background-color: #FAF9F6;
            color: #1a1c1a;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="font-body selection:bg-primary-fixed">
<!-- Header Navigation -->
<header class="sticky top-0 z-50 w-full bg-surface/80 backdrop-blur-md px-4 h-16 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 text-on-surface active:scale-95 transition-transform" onclick="window.history.back()">
<span class="material-symbols-outlined text-[28px]">arrow_back</span>
</button>
<h1 class="font-headline text-lg font-bold text-on-surface">添加账户</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-highest border-2 border-white shadow-sm">
<img alt="Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKhsCDezrdFjHxYQBZGpJ7FttX6iYMM_xILNuN3xmsbmsDUFjH_fKrXgo7AAiNIq1BjY4dhNUxptayd9E4uJRo_bq5B0LlukPRgen0a0QPvHNKy8bRmjI47GVq-Ws8drjE4qmm8ULKdZ5Nq21I3IGpyDFV-wusQelFO3lUqHhQfaP42ktezSSMLmAkzCymXiLrhU-DWnuXMMfY2ZTCLAM3G-AEiHYS5g32gcmzAAV0tJ2tw4HF9W-R92ykaCN2Reu97gNFLJJp47BZ"/>
</div>
</header>
<main class="max-w-2xl mx-auto px-4 pb-12">
<!-- Search Section -->
<section class="mt-4 mb-6">
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">search</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-low border-none rounded-xl focus:ring-1 focus:ring-primary text-sm placeholder:text-outline/60 transition-all shadow-sm" placeholder="搜索机构或平台" type="text"/>
</div>
</section>
<!-- Horizontal Tab Bar -->
<section class="mb-6 -mx-4">
<div class="flex items-center overflow-x-auto hide-scrollbar px-4 gap-2">
<button class="flex-none px-5 py-2 rounded-full bg-primary text-white text-sm font-semibold transition-all">热门</button>
<button class="flex-none px-5 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-all">银行</button>
<button class="flex-none px-5 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-all">支付</button>
<button class="flex-none px-5 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-all">证券</button>
<button class="flex-none px-5 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-all">基金平台</button>
<button class="flex-none px-5 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-all">保险</button>
<button class="flex-none px-5 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-all">其他</button>
</div>
</section>
<!-- Institution List Section -->
<section>
<div class="flex items-center justify-between mb-4">
<h2 class="font-headline text-sm font-bold text-on-surface-variant">常用金融机构</h2>
<button class="text-xs font-semibold text-primary hover:opacity-80">全部 A-Z</button>
</div>
<div class="space-y-3">
<!-- Institution Card 1 -->
<div class="group flex items-center justify-between p-4 bg-white rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] active:bg-surface-container transition-all cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-2xl" style="font-variation-settings: 'FILL' 1;">shield_person</span>
</div>
<div>
<div class="flex items-center gap-2">
<p class="font-headline text-sm font-bold text-on-surface">招商银行</p>
<span class="px-1.5 py-0.5 rounded text-[10px] font-bold bg-error-container text-error leading-none">热门</span>
</div>
<span class="inline-block mt-1 px-2 py-0.5 rounded-full text-[10px] font-medium bg-surface-container text-on-surface-variant">银行</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</div>
<!-- Institution Card 2 -->
<div class="group flex items-center justify-between p-4 bg-white rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] active:bg-surface-container transition-all cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center">
<span class="material-symbols-outlined text-blue-600 text-2xl" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<div>
<div class="flex items-center gap-2">
<p class="font-headline text-sm font-bold text-on-surface">中国建设银行</p>
<span class="px-1.5 py-0.5 rounded text-[10px] font-bold bg-error-container text-error leading-none">热门</span>
</div>
<span class="inline-block mt-1 px-2 py-0.5 rounded-full text-[10px] font-medium bg-surface-container text-on-surface-variant">银行</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</div>
<!-- Institution Card 3 -->
<div class="group flex items-center justify-between p-4 bg-white rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] active:bg-surface-container transition-all cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div>
<div class="flex items-center gap-2">
<p class="font-headline text-sm font-bold text-on-surface">支付宝</p>
<span class="px-1.5 py-0.5 rounded text-[10px] font-bold bg-error-container text-error leading-none">热门</span>
</div>
<span class="inline-block mt-1 px-2 py-0.5 rounded-full text-[10px] font-medium bg-surface-container text-on-surface-variant">支付</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</div>
<!-- Institution Card 4 -->
<div class="group flex items-center justify-between p-4 bg-white rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] active:bg-surface-container transition-all cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-2xl" style="font-variation-settings: 'FILL' 1;">query_stats</span>
</div>
<div>
<div class="flex items-center gap-2">
<p class="font-headline text-sm font-bold text-on-surface">中信证券</p>
</div>
<span class="inline-block mt-1 px-2 py-0.5 rounded-full text-[10px] font-medium bg-surface-container text-on-surface-variant">证券</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</div>
<!-- Manual Add -->
<div class="group flex items-center justify-between p-4 bg-white rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-dashed border-outline-variant/50 active:bg-surface-container transition-all cursor-pointer mt-6">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-2xl">add</span>
</div>
<div>
<p class="font-headline text-sm font-bold text-on-surface">手动添加其他机构</p>
<p class="text-[10px] text-outline">未在列表中找到您的机构？</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</div>
</div>
</section>
</main>
<script>
        document.querySelectorAll('button, .cursor-pointer').forEach(el => {
            el.addEventListener('touchstart', () => {
                el.classList.add('opacity-70');
            });
            el.addEventListener('touchend', () => {
                el.classList.remove('opacity-70');
            });
        });
    </script>
</body></html>
