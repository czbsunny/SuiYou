# 服务器配置
server.port=8080
server.servlet.context-path=/api
spring.main.banner-mode=off

# 数据源配置
spring.datasource.url=jdbc:mysql://localhost:3306/suiyou?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
#spring.datasource.url=jdbc:mysql://rm-7xvba9tp98k38d62q.mysql.rds.aliyuncs.com:3306/suiyou?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sunny520
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
# 控制字段顺序配置
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.hbm2ddl.order_fields_by_name=true
spring.application.name=suiyou-server

# JWT配置
app.jwtSecret=SuiYouSecretKeyForJWTTokenGenerationAndValidationMustBeAtLeast64Characters!
app.jwtExpirationInMs=86400000

# 日志配置
logging.level.root=INFO
logging.level.com.suiyou=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# WeChat mini program config (optional). If both appid and secret are set, server will call jscode2session.
wechat.appid=
wechat.secret=
# If true (default) the server will mock jscode2session and generate a fake openid for development and review.
wechat.mock=true

# Elasticsearch配置
elasticsearch.host=localhost
elasticsearch.port=9200
elasticsearch.scheme=http
elasticsearch.enable=true
elasticsearch.index=funds

# OCR配置
# OCR引擎类型：local(EasyOCR), baidu(百度云OCR), alicloud(阿里云OCR)
ocr.engine=baidu

# 本地OCR引擎配置
ocr.local.languages=ch_sim,en
ocr.local.gpu=false

# 百度云OCR配置
ocr.baidu.app-id=120330947
ocr.baidu.api-key=b91GN4Ui4vDzfupDMUR0OCfZ
ocr.baidu.secret-key=l6yW48FT8KHLoitJC5vTZ1mHWGqnApmS
ocr.baidu.timeout=30
ocr.baidu.retry-count=2
ocr.baidu.retry-delay=1

# 阿里云OCR配置（预留）
ocr.alicloud.access-key-id=
ocr.alicloud.access-key-secret=
ocr.alicloud.endpoint=ocr-api.cn-hangzhou.aliyuncs.com
ocr.alicloud.timeout=30
ocr.alicloud.retry-count=2
ocr.alicloud.retry-delay=1

# OCR通用配置
ocr.general.confidence-threshold=0.5
ocr.general.max-retries=3
ocr.general.retry-interval=1
ocr.general.save-recognition-results=false
ocr.general.result-save-path=./data/ocr_results

# Data Server 配置
